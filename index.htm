<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Enter Info</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css" rel="stylesheet">
    </head>

    <body class="bg-gray-200">

        <div class="relative flex items-center max-w-md mx-auto mt-15 mb-15">
            <label class="text-[15px] text-slate-900 font-medium absolute px-2 top-[-10px] left-[18px]">Select Profile
                Photo</label>

            <div class="max-w-md mx-auto mt-4">

                <div class="flex gap-4">
                    <a
                        onclick="changeAvatar('https://i.pinimg.com/736x/04/7e/17/047e17281fcd34c303f1c13792931504.jpg')">
                        <img src="https://i.pinimg.com/736x/04/7e/17/047e17281fcd34c303f1c13792931504.jpg"
                            class="w-16 h-16 rounded-full cursor-pointer border-2 hover:border-black">
                    </a>

                    <a
                        onclick="changeAvatar('https://i.pinimg.com/736x/31/7f/18/317f182a664b9c0b16ce746c0754b954.jpg')">
                        <img src="https://i.pinimg.com/736x/31/7f/18/317f182a664b9c0b16ce746c0754b954.jpg"
                            class="w-16 h-16 rounded-full cursor-pointer border-2 hover:border-black">
                    </a>

                    <a
                        onclick="changeAvatar('https://i.pinimg.com/736x/c3/20/d6/c320d6fbb902d639ee5692ec70dbb24c.jpg')">
                        <img src="https://i.pinimg.com/736x/c3/20/d6/c320d6fbb902d639ee5692ec70dbb24c.jpg"
                            class="w-16 h-16 rounded-full cursor-pointer border-2 hover:border-black">
                    </a>

                    <a
                        onclick="changeAvatar('https://i.pinimg.com/736x/59/63/a9/5963a9765d39148e6ea6a00073de8ad3.jpg')">
                        <img src="https://i.pinimg.com/736x/59/63/a9/5963a9765d39148e6ea6a00073de8ad3.jpg"
                            class="w-16 h-16 rounded-full cursor-pointer border-2 hover:border-black">
                    </a>

                    <a
                        onclick="changeAvatar('https://i.pinimg.com/1200x/71/58/48/715848a176fc0052793692dffd4637a7.jpg')">
                        <img src="https://i.pinimg.com/1200x/71/58/48/715848a176fc0052793692dffd4637a7.jpg"
                            class="w-16 h-16 rounded-full cursor-pointer border-2 hover:border-black">
                    </a>
                </div>


                <div class="relative flex items-center max-w-md mx-auto mt-4">
                    <label
                        class="text-[13px] bg-gray-300 text-slate-900 font-medium absolute px-2 top-[-10px] left-[18px]">First
                        Name</label>

                    <input id="name" type="text" placeholder="Enter First Name"
                        class="pl-4 pr-12 py-3.5 bg-gray-300 text-[#333] w-full text-sm border-2 border-gray-300 focus:border-[#333] rounded outline-none" />

                    <svg xmlns="http://www.w3.org/2000/svg" fill="#bbb" stroke="#bbb"
                        class="w-[18px] h-[18px] absolute right-4" viewBox="0 0 24 24">
                        <circle cx="10" cy="7" r="6" data-original="#000000"></circle>
                        <path
                            d="M14 15H6a5 5 0 0 0-5 5 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 5 5 0 0 0-5-5zm8-4h-2.59l.3-.29a1 1 0 0 0-1.42-1.42l-2 2a1 1 0 0 0 0 1.42l2 2a1 1 0 0 0 1.42 0 1 1 0 0 0 0-1.42l-.3-.29H22a1 1 0 0 0 0-2z"
                            data-original="#000000"></path>
                    </svg>
                </div>


                <div class="relative flex items-center max-w-md mx-auto mt-4">
                    <label
                        class="text-[13px] bg-gray-300 text-slate-900 font-medium absolute px-2 top-[-10px] left-[18px]">Last
                        Name</label>

                    <input id="lastName" type="text" placeholder="Enter Last Name"
                        class="pl-4 pr-12 py-3.5 bg-gray-300 text-[#333] w-full text-sm border-2 border-gray-300 focus:border-[#333] rounded outline-none" />

                    <svg xmlns="http://www.w3.org/2000/svg" fill="#bbb" stroke="#bbb"
                        class="w-[18px] h-[18px] absolute right-4" viewBox="0 0 24 24">
                        <circle cx="10" cy="7" r="6" data-original="#000000"></circle>
                        <path
                            d="M14 15H6a5 5 0 0 0-5 5 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 5 5 0 0 0-5-5zm8-4h-2.59l.3-.29a1 1 0 0 0-1.42-1.42l-2 2a1 1 0 0 0 0 1.42l2 2a1 1 0 0 0 1.42 0 1 1 0 0 0 0-1.42l-.3-.29H22a1 1 0 0 0 0-2z"
                            data-original="#000000"></path>
                    </svg>
                </div>


                <div class="relative flex items-center max-w-md mx-auto mt-4">
                    <label
                        class="text-[13px] bg-gray-300 text-slate-900 font-medium absolute px-2 top-[-10px] left-[18px]">User
                        Name</label>

                    <input id="userName" type="text" placeholder="Enter User Name"
                        class="pl-4 pr-12 py-3.5 bg-gray-300 text-[#333] w-full text-sm border-2 border-gray-300 focus:border-[#333] rounded outline-none" />

                    <svg xmlns="http://www.w3.org/2000/svg" fill="#bbb" stroke="#bbb"
                        class="w-[18px] h-[18px] absolute right-4" viewBox="0 0 682.667 682.667">
                        <defs>
                            <clipPath id="a" clipPathUnits="userSpaceOnUse">
                                <path d="M0 512h512V0H0Z" data-original="#000000"></path>
                            </clipPath>
                        </defs>
                        <g clip-path="url(#a)" transform="matrix(1.33 0 0 -1.33 0 682.667)">
                            <path fill="none" stroke-miterlimit="10" stroke-width="40"
                                d="M452 444H60c-22.091 0-40-17.909-40-40v-39.446l212.127-157.782c14.17-10.54 33.576-10.54 47.746 0L492 364.554V404c0 22.091-17.909 40-40 40Z"
                                data-original="#000000"></path>
                            <path
                                d="M472 274.9V107.999c0-11.027-8.972-20-20-20H60c-11.028 0-20 8.973-20 20V274.9L0 304.652V107.999c0-33.084 26.916-60 60-60h392c33.084 0 60 26.916 60 60v196.653Z"
                                data-original="#000000"></path>
                        </g>
                    </svg>
                </div>

                <div class="relative flex items-center max-w-md mx-auto mt-4">
                    <label
                        class="text-[13px] bg-gray-300 text-slate-900 font-medium absolute px-2 top-[-10px] left-[18px]">Motto</label>

                    <input id="motto" type="text" placeholder="Enter Motto"
                        class="pl-4 pr-12 py-3.5 bg-gray-300 text-[#333] w-full text-sm border-2 border-gray-300 focus:border-[#333] rounded outline-none" />

                    <svg xmlns="http://www.w3.org/2000/svg" fill="#bbb" class="w-[18px] h-[18px] absolute right-4"
                        viewBox="0 0 24 24">
                        <path
                            d="M20.48 8.301A9.217 9.217 0 0 1 21.25 12c0 5.105-4.145 9.25-9.25 9.25S2.75 17.105 2.75 12 6.895 2.75 12 2.75a.75.75 0 0 0 0-1.5C6.067 1.25 1.25 6.067 1.25 12S6.067 22.75 12 22.75 22.75 17.933 22.75 12c0-1.529-.32-2.983-.896-4.301a.75.75 0 0 0-1.374.602z"
                            data-original="#000000" />
                        <path
                            d="M17 1.25a3.443 3.443 0 0 0-3.442 3.442c0 .594.269 1.317.685 2.023.835 1.421 2.227 2.815 2.227 2.815a.749.749 0 0 0 1.06 0s1.392-1.394 2.227-2.815c.416-.706.685-1.429.685-2.023 0-1.9-1.542-3.442-3.442-3.442zm0 1.5c1.072 0 1.942.87 1.942 1.942 0 .528-.393 1.177-.815 1.789A15.328 15.328 0 0 1 17 7.901c-.325-.366-.75-.874-1.127-1.42-.422-.612-.815-1.261-.815-1.789 0-1.072.87-1.942 1.942-1.942zM1.603 12.636l3.27 2.044c.596.372 1.285.57 1.987.57h.76c.657 0 1.281.287 1.709.786l1.051 1.227a2.25 2.25 0 0 1 .456 2.082l-.557 1.949a.75.75 0 0 0 1.442.412l.557-1.949a3.748 3.748 0 0 0-.759-3.47l-1.052-1.227a3.746 3.746 0 0 0-2.847-1.31h-.76c-.421 0-.834-.118-1.192-.342l-3.271-2.044a.75.75 0 1 0-.794 1.272z"
                            data-original="#000000" />
                        <path
                            d="m5.329 4.335 1.596 3.192a2.748 2.748 0 0 0 1.757 1.429l1.758.465c.443.117.786.467.894.912l.753 3.087a2.75 2.75 0 0 0 1.146 1.637l.466.31a2.746 2.746 0 0 0 3.985-1.058l.575-1.151a1.25 1.25 0 0 1 .815-.653l2.791-.698a.75.75 0 0 0-.364-1.455l-2.791.697a2.752 2.752 0 0 0-1.792 1.438l-.576 1.151a1.246 1.246 0 0 1-1.811.481l-.466-.31a1.25 1.25 0 0 1-.521-.744l-.752-3.087a2.75 2.75 0 0 0-1.969-2.007l-1.758-.465a1.247 1.247 0 0 1-.798-.65L6.671 3.665a.75.75 0 1 0-1.342.67z"
                            data-original="#000000" />
                    </svg>
                </div>
                <button onclick="submitData()" class="px-5 py-2.5 w-full cursor-pointer !mt-4 text-[15px] font-medium bg-green-900 hover:bg-[#006b49] text-white rounded-md">Submit</button>
            </div>

        </div>

        <!-- ---------------------------Cards----------------------------- -->
        <div id="cards" class="max-w-8xl md:mx-10 flex flex-wrap justify-center ">

        </div>


        <script src="form.js"></script>
    </body>

</html>
